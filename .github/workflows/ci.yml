name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, arch: arm64 }
          - { os: ubuntu-24.04, arch: x64 }
          - { os: ubuntu-24.04-arm, arch: arm64 } # free for public repos only
          - { os: windows-2025, arch: amd64 }
          - { os: windows-11-arm, arch: arm64 }   # free for public repos only
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        # apt/brew install the arch-correct binary; gha-setup-ninja ships x64-only
        # archives that break on the arm64 Linux runner.
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -q && sudo apt-get install -y ninja-build
          else
            brew install ninja
          fi
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
      - name: Configure
        run: cmake --preset ci
      - name: Build
        run: cmake --build --preset ci
      - name: Test
        run: ctest --preset ci
      - name: Upload image-diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: image_failures-${{ matrix.os }}
          path: build/ci/tests/image_failures/
          if-no-files-found: ignore

  asan:
    name: ASan + UBSan (macOS arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install ninja
      - run: cmake --preset asan
      - run: cmake --build --preset asan
      - run: ctest --preset asan

  lsan:
    # LeakSanitizer is unsupported on macOS arm64, so leaks are checked here
    # (macOS gets a local `leaks --atExit` pass per the release checklist).
    name: ASan + LSan (Linux x64)
    runs-on: ubuntu-24.04
    env:
      ASAN_OPTIONS: detect_leaks=1
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - run: cmake --preset asan
      - run: cmake --build --preset asan
      - run: ctest --preset asan

  docs:
    name: Docs site (one command, clean checkout)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build doxygen
      - run: cmake --preset release
      - run: cmake --build --preset release --target docs
      - run: test -f build/release/docs/site/index.html
             && test -f build/release/docs/site/gallery.html
             && test -f build/release/docs/site/api/index.html

  interactive:
    name: Interactive backend (Linux + xvfb)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (ninja, X/Wayland/GL for GLFW, xvfb)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build xorg-dev libgl1-mesa-dev xvfb \
            libwayland-dev wayland-protocols libxkbcommon-dev
      - name: Configure
        run: cmake --preset ci -DGRAPHLIB_INTERACTIVE=ON
      - name: Build
        run: cmake --build --preset ci
      - name: Window smoke under xvfb
        run: xvfb-run -a ctest --preset ci -R interactive_smoke --output-on-failure

  macos-x86-cross:
    name: macOS x86_64 cross slice (tier 2, build only)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install ninja
      - run: cmake --preset ci -DCMAKE_OSX_ARCHITECTURES=x86_64
      - run: cmake --build --preset ci
